<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuantityMeasurementApp</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <div class="qm-app">
      <header class="qm-header">
        <div class="qm-logo">QuantityMeasurementApp</div>
        <div class="qm-header-actions">
          <button id="historyBtn" class="qm-history-btn">History</button>
          <button id="logoutBtn" class="qm-logout-btn">Logout</button>
        </div>
      </header>

      <!-- History Panel -->
      <div id="historyPanel" class="qm-history-panel">
        <div class="qm-history-header">
          <h3>Operation History</h3>
          <button
            id="closeHistoryBtn"
            onclick="
              document
                .getElementById('historyPanel')
                .classList.remove('is-open')
            "
          >
            ✕
          </button>
        </div>
        <ul id="historyList" class="qm-history-list">
          <li class="hist-empty">Click History to load.</li>
        </ul>
      </div>

      <main class="qm-main">
        <section class="qm-hero">
          <h1>Welcome To Quantity Measurement</h1>
        </section>

        <section class="qm-content">
          <div class="qm-type-section">
            <h2 class="qm-section-title">Choose Type</h2>
            <div class="qm-type-cards">
              <button
                class="qm-type-card is-active"
                data-type="length"
                type="button"
              >
                <span class="qm-type-label">Length</span>
              </button>
              <button
                class="qm-type-card"
                data-type="temperature"
                type="button"
              >
                <span class="qm-type-label">Temperature</span>
              </button>
              <button class="qm-type-card" data-type="volume" type="button">
                <span class="qm-type-label">Volume</span>
              </button>
              <button class="qm-type-card" data-type="weight" type="button">
                <span class="qm-type-label">Weight</span>
              </button>
            </div>
          </div>

          <div class="qm-op-tabs">
            <h2 class="qm-section-title">Choose Operation</h2>
            <div class="qm-tab-buttons">
              <button class="qm-op-tab is-active" data-op="convert">
                Convert ↔
              </button>
              <button class="qm-op-tab" data-op="compare">Compare ⚖</button>
              <button class="qm-op-tab" data-op="add">
                <svg><use href="icons/add.svg"></use></svg>
                Add
              </button>
              <button class="qm-op-tab" data-op="subtract">
                <svg><use href="icons/subtract.svg"></use></svg>
                Subtract
              </button>
              <button class="qm-op-tab" data-op="divide">
                <svg><use href="icons/divide.svg"></use></svg>
                Divide
              </button>
            </div>
          </div>

          <div id="operations-area">
            <!-- Convert -->
            <div id="convert-section" class="op-section is-active">
              <div class="qm-conversion-section">
                <div class="qm-card qm-from">
                  <span class="qm-card-label">From</span>
                  <div class="qm-current-unit" id="convertFromCurrent">
                    FEET
                  </div>
                  <div class="qm-input-row">
                    <input
                      type="number"
                      class="qm-number-input"
                      id="convertFromValue"
                      value="1"
                    />
                    <div class="qm-select-wrapper">
                      <select id="convertFromUnit" class="qm-select"></select>
                    </div>
                  </div>
                </div>
                <div class="qm-card qm-to">
                  <span class="qm-card-label">To</span>
                  <div class="qm-current-unit" id="convertToCurrent">
                    INCHES
                  </div>
                  <div class="qm-input-row">
                    <input
                      type="number"
                      class="qm-number-input"
                      readonly
                      id="convertToValue"
                      value=""
                    />
                    <div class="qm-select-wrapper">
                      <select id="convertToUnit" class="qm-select"></select>
                    </div>
                  </div>
                </div>
              </div>
              <button id="convertBtn" class="qm-op-btn">Convert</button>
            </div>

            <!-- Compare -->
            <div id="compare-section" class="op-section">
              <div class="qm-conversion-section">
                <div class="qm-card qm-from">
                  <span class="qm-card-label">Quantity 1</span>
                  <div class="qm-current-unit" id="compareQ1Current">FEET</div>
                  <div class="qm-input-row">
                    <input
                      type="number"
                      class="qm-number-input"
                      id="q1Value"
                      value="1"
                    />
                    <div class="qm-select-wrapper">
                      <select id="q1Unit" class="qm-select"></select>
                    </div>
                  </div>
                </div>
                <div class="qm-card qm-to">
                  <span class="qm-card-label">Quantity 2</span>
                  <div class="qm-current-unit" id="compareQ2Current">FEET</div>
                  <div class="qm-input-row">
                    <input
                      type="number"
                      class="qm-number-input"
                      id="q2Value"
                      value="1"
                    />
                    <div class="qm-select-wrapper">
                      <select id="q2Unit" class="qm-select"></select>
                    </div>
                  </div>
                </div>
              </div>
              <button id="compareBtn" class="qm-op-btn">Compare</button>
            </div>

            <!-- Add -->
            <div id="add-section" class="op-section">
              <div class="qm-conversion-section">
                <div class="qm-card qm-from">
                  <span class="qm-card-label">Quantity 1</span>
                  <div class="qm-current-unit" id="addQ1Current">FEET</div>
                  <div class="qm-input-row">
                    <input
                      type="number"
                      class="qm-number-input"
                      id="addQ1Value"
                      value="1"
                    />
                    <div class="qm-select-wrapper">
                      <select id="addQ1Unit" class="qm-select"></select>
                    </div>
                  </div>
                </div>
                <div class="qm-card qm-to">
                  <span class="qm-card-label">Quantity 2</span>
                  <div class="qm-current-unit" id="addQ2Current">FEET</div>
                  <div class="qm-input-row">
                    <input
                      type="number"
                      class="qm-number-input"
                      id="addQ2Value"
                      value="1"
                    />
                    <div class="qm-select-wrapper">
                      <select id="addQ2Unit" class="qm-select"></select>
                    </div>
                  </div>
                </div>
              </div>
              <button id="addBtn" class="qm-op-btn">Add</button>
            </div>

            <!-- Subtract -->
            <div id="subtract-section" class="op-section">
              <div class="qm-conversion-section">
                <div class="qm-card qm-from">
                  <span class="qm-card-label">Quantity 1</span>
                  <div class="qm-current-unit" id="subtractQ1Current">FEET</div>
                  <div class="qm-input-row">
                    <input
                      type="number"
                      class="qm-number-input"
                      id="subtractQ1Value"
                      value="1"
                    />
                    <div class="qm-select-wrapper">
                      <select id="subtractQ1Unit" class="qm-select"></select>
                    </div>
                  </div>
                </div>
                <div class="qm-card qm-to">
                  <span class="qm-card-label">Quantity 2</span>
                  <div class="qm-current-unit" id="subtractQ2Current">FEET</div>
                  <div class="qm-input-row">
                    <input
                      type="number"
                      class="qm-number-input"
                      id="subtractQ2Value"
                      value="1"
                    />
                    <div class="qm-select-wrapper">
                      <select id="subtractQ2Unit" class="qm-select"></select>
                    </div>
                  </div>
                </div>
              </div>
              <button id="subtractBtn" class="qm-op-btn">Subtract</button>
            </div>

            <!-- Divide -->
            <div id="divide-section" class="op-section">
              <div class="qm-conversion-section">
                <div class="qm-card qm-from">
                  <span class="qm-card-label">Quantity 1</span>
                  <div class="qm-current-unit" id="divideQ1Current">FEET</div>
                  <div class="qm-input-row">
                    <input
                      type="number"
                      class="qm-number-input"
                      id="divideQ1Value"
                      value="100"
                    />
                    <div class="qm-select-wrapper">
                      <select id="divideQ1Unit" class="qm-select"></select>
                    </div>
                  </div>
                </div>
                <div class="qm-card qm-to">
                  <span class="qm-card-label">Quantity 2</span>
                  <div class="qm-current-unit" id="divideQ2Current">FEET</div>
                  <div class="qm-input-row">
                    <input
                      type="number"
                      class="qm-number-input"
                      id="divideQ2Value"
                      value="2"
                    />
                    <div class="qm-select-wrapper">
                      <select id="divideQ2Unit" class="qm-select"></select>
                    </div>
                  </div>
                </div>
              </div>
              <button id="divideBtn" class="qm-op-btn">Divide</button>
            </div>
          </div>

          <div id="result" class="qm-result"></div>
        </section>
      </main>
    </div>
    <script src="config.js"></script>
    <script src="dashboard.js"></script>
  </body>
</html>
