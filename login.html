<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuantityMeasurementApp - Login / Signup</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="auth-wrapper">
      <div class="auth-illustration">
        <div class="auth-illustration-inner">
          <svg viewBox="0 0 120 80" class="ruler-icon" width="80" height="60">
            <rect x="10" y="10" width="100" height="8" rx="4" fill="#667eea" />
            <rect x="10" y="24" width="60" height="6" rx="3" fill="#764ba2" />
            <rect x="75" y="24" width="35" height="6" rx="3" fill="#667eea" />
            <line
              x1="20"
              y1="5"
              x2="20"
              y2="15"
              stroke="#4a5568"
              stroke-width="2"
            />
            <line
              x1="35"
              y1="5"
              x2="35"
              y2="15"
              stroke="#4a5568"
              stroke-width="2"
            />
            <line
              x1="50"
              y1="5"
              x2="50"
              y2="15"
              stroke="#4a5568"
              stroke-width="3"
            />
            <line
              x1="65"
              y1="5"
              x2="65"
              y2="15"
              stroke="#4a5568"
              stroke-width="2"
            />
            <line
              x1="80"
              y1="19"
              x2="80"
              y2="29"
              stroke="#4a5568"
              stroke-width="2"
            />
            <line
              x1="95"
              y1="19"
              x2="95"
              y2="29"
              stroke="#4a5568"
              stroke-width="3"
            />
            <line
              x1="110"
              y1="19"
              x2="110"
              y2="29"
              stroke="#4a5568"
              stroke-width="2"
            />
          </svg>
          <h2>QuantityMeasurementApp</h2>
          <p class="tagline">Precise Conversions, Made Simple</p>
        </div>
      </div>

      <div class="auth-form-container">
        <div class="tabs">
          <div
            class="tab active"
            id="loginTab"
            role="tab"
            tabindex="0"
            aria-controls="loginForm"
            aria-selected="true"
          >
            LOGIN
          </div>
          <div
            class="tab"
            id="signupTab"
            role="tab"
            tabindex="0"
            aria-controls="signupForm"
            aria-selected="false"
          >
            SIGNUP
          </div>
        </div>

        <div class="forms-area">
          <form
            id="loginForm"
            class="form-panel is-active"
            role="tabpanel"
            aria-labelledby="loginTab"
          >
            <div class="field">
              <label for="loginEmail">Email</label>
              <input type="email" id="loginEmail" placeholder="Enter email" />
            </div>
            <div class="field">
              <label for="loginPassword">Password</label>
              <div class="input-wrapper">
                <input
                  type="password"
                  id="loginPassword"
                  placeholder="Enter password"
                />
                <span
                  class="toggle-password"
                  data-target="loginPassword"
                  title="Show/Hide"
                  >👁</span
                >
              </div>
            </div>
            <div id="loginError" class="error-msg"></div>
            <button type="button" class="primary-btn" id="loginButton">
              Login
            </button>
          </form>

          <form
            id="signupForm"
            class="form-panel"
            role="tabpanel"
            aria-labelledby="signupTab"
          >
            <div class="field">
              <label for="fullName">Full Name</label>
              <input type="text" id="fullName" placeholder="Enter full name" />
            </div>
            <div class="field">
              <label for="signupEmail">Email</label>
              <input type="email" id="signupEmail" placeholder="Enter email" />
            </div>
            <div class="field">
              <label for="signupPassword">Password</label>
              <div class="input-wrapper">
                <input
                  type="password"
                  id="signupPassword"
                  placeholder="Min 8 chars, upper, lower, number, special"
                />
                <span
                  class="toggle-password"
                  data-target="signupPassword"
                  title="Show/Hide"
                  >👁</span
                >
              </div>
            </div>
            <div id="signupError" class="error-msg"></div>
            <button type="button" class="primary-btn" id="signupButton">
              Signup
            </button>
          </form>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
